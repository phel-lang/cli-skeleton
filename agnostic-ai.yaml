# yaml-language-server: $schema=https://raw.githubusercontent.com/Chemaclass/agnostic-ai/main/docs/schemas/config.schema.json
version: 1

sources:
  agents: .agnostic-ai/agents
  skills: .agnostic-ai/skills
  rules: .agnostic-ai/rules
  hooks: .agnostic-ai/hooks
  mcps: .agnostic-ai/mcps
  commands: .agnostic-ai/commands

targets:
  - claude
  - codex

on-unsupported: warn

# Keep Claude's project memory at the nested .claude/CLAUDE.md (a documented
# Claude Code location); Codex gets the same body at the root AGENTS.md.
outputs:
  claude:
    file: .claude/CLAUDE.md

# Commit the generated agent config (.claude/, AGENTS.md) so anyone cloning the
# skeleton gets working AI rules without installing agnostic-ai. The tool is
# only needed to EDIT the specs; `sync --check` (CI + pre-commit) guards drift.
gitignore:
  enabled: false
