name: Bug report
description: Something in the skeleton doesn't work as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing! For bugs in **phel-lang itself** (compiler, runtime,
        CLI commands like `phel lint` / `phel doctor`), please file at
        https://github.com/phel-lang/phel-lang/issues instead. This tracker
        is for the cli-skeleton template.
  - type: input
    id: phel-version
    attributes:
      label: Phel version
      description: Output of `vendor/bin/phel --version`
      placeholder: v0.39.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: Output of `php -v` (first line)
      placeholder: PHP 8.4.x
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands run from a fresh clone.
      placeholder: |
        1. git clone ...
        2. composer install
        3. composer dev
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
