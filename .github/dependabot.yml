version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      phel:
        patterns:
          - phel-lang/*
      symfony:
        patterns:
          - symfony/*
    # symfony/console v8 removed Application::add(), which phel.cli still
    # calls — tracked upstream at phel-lang/phel-lang#2033. Drop this
    # ignore once the upstream fix ships.
    ignore:
      - dependency-name: "symfony/console"
        versions: [">=8.0"]
      - dependency-name: "symfony/var-dumper"
        versions: [">=8.0"]
    labels:
      - dependencies
      - php

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /build
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
